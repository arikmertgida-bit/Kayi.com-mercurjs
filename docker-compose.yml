services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.5'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mercurjs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.25'
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.5'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  meilisearch:
    image: getmeili/meilisearch:v1.12.0
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.75'
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey_kayicom}
      MEILI_ENV: production
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mercurjs
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      STORE_CORS: ${STORE_CORS:-http://localhost:3000,http://localhost:8000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:5173,http://localhost:9000}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:5173,http://localhost:7001,http://localhost:9000}
      VENDOR_CORS: ${VENDOR_CORS:-http://localhost:7001}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: medusa-media
      MINIO_PUBLIC_URL: http://localhost:9002
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-masterKey_kayicom}
      MEILISEARCH_PRODUCT_INDEX_NAME: products
      STRIPE_SECRET_API_KEY: ${STRIPE_SECRET_API_KEY:-sk_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      MESSENGER_INTERNAL_URL: http://kayi-messenger:4000
      MESSENGER_INTERNAL_SECRET: ${MESSENGER_INTERNAL_SECRET:-kayi-internal-secret}
      DEV_REVIEW_BYPASS_EMAIL: ${DEV_REVIEW_BYPASS_EMAIL:-cyclo@gmail.com}
      DEV_REVIEW_BYPASS_ORDER_ID: ${DEV_REVIEW_BYPASS_ORDER_ID:-__dev_bypass_order__}
      NODE_OPTIONS: "--max-old-space-size=512"
    mem_limit: 1g
    cpus: '1.5'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-panel:
    build:
      context: ./admin-panel
      args:
        VITE_MEDUSA_BASE: /
        VITE_MEDUSA_BACKEND_URL: http://localhost:9000
        VITE_MEDUSA_STOREFRONT_URL: http://localhost:3000
    restart: unless-stopped
    mem_limit: 64m
    cpus: '0.25'
    # nginx listens on port 80 inside the container
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vendor-panel:
    build:
      context: ./vendor-panel
      args:
        VITE_MEDUSA_BASE: /
        VITE_MEDUSA_BACKEND_URL: http://localhost:9000
        VITE_MEDUSA_STOREFRONT_URL: http://localhost:3000
        VITE_MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-pk_fe7220c20ab9f3cc9b0fbb86f6c2e126e621d17f7c176584cbdd7fe8b04c67af}
        VITE_DISABLE_SELLERS_REGISTRATION: "false"
    restart: unless-stopped
    mem_limit: 64m
    cpus: '0.25'
    # nginx listens on port 80 inside the container
    ports:
      - "7001:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  storefront:
    build:
      context: ./storefront
      args:
        NEXT_PUBLIC_BASE_URL: http://localhost:3000
        NEXT_PUBLIC_DEFAULT_REGION: tr
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-pk_242a1899a51980a715b8315f91107ba3dd5f54500e920e7e0e8a3ba77eb1ade3}
        NEXT_PUBLIC_SITE_NAME: "Kayı | Güvenle Al, Güvenle Sat"
        NEXT_PUBLIC_SITE_DESCRIPTION: "Kayı | Güvenle Al, Güvenle Sat"
        NEXT_PUBLIC_VENDOR_URL: http://localhost:7001
        NEXT_PUBLIC_MESSENGER_URL: http://localhost:4000
        NEXT_PUBLIC_MEILISEARCH_HOST: http://localhost:7700
        MEDUSA_BACKEND_URL: http://backend:9000
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.5'
    # Container exposes 8000 (Next.js standalone); mapped to host 3000
    ports:
      - "3000:8000"
    depends_on:
      backend:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_REGION: tr
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${MEDUSA_PUBLISHABLE_KEY:-pk_242a1899a51980a715b8315f91107ba3dd5f54500e920e7e0e8a3ba77eb1ade3}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-supersecret}
      NEXT_PUBLIC_SITE_NAME: "Kayı | Güvenle Al, Güvenle Sat"
      NEXT_PUBLIC_SITE_DESCRIPTION: "Kayı | Güvenle Al, Güvenle Sat"
      NEXT_PUBLIC_VENDOR_URL: http://localhost:7001
      NEXT_PUBLIC_MESSENGER_URL: http://localhost:4000
      NEXT_PUBLIC_MEILISEARCH_HOST: http://localhost:7700
      NEXT_IMAGE_UNOPTIMIZED: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8000/ 2>&1 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kayi-messenger:
    build:
      context: ./kayi-messenger
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.5'
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kayi_messenger
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      PORT: "4000"
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:7001}
      BACKEND_URL: http://backend:9000
      MESSENGER_INTERNAL_SECRET: ${MESSENGER_INTERNAL_SECRET:-kayi-internal-secret}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: medusa-media
      MINIO_PUBLIC_URL: http://localhost:9002
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
