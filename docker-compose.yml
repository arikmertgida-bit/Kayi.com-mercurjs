services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mercurjs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mercurjs
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret
      COOKIE_SECRET: supersecret
      STORE_CORS: http://localhost:3000,http://localhost:8000
      ADMIN_CORS: http://localhost:5173,http://localhost:9000
      AUTH_CORS: http://localhost:5173,http://localhost:7001,http://localhost:9000
      VENDOR_CORS: http://localhost:7001
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: medusa-media
      MINIO_PUBLIC_URL: http://localhost:9002
      NODE_OPTIONS: "--max-old-space-size=512"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  admin-panel:
    build:
      context: ./admin-panel
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_MEDUSA_BASE: /
      VITE_MEDUSA_BACKEND_URL: http://localhost:9000
      VITE_MEDUSA_STOREFRONT_URL: http://localhost:3000

  vendor-panel:
    build:
      context: ./vendor-panel
    restart: unless-stopped
    ports:
      - "7001:7001"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: "7001"
      BACKEND_INTERNAL_URL: http://backend:9000
      VITE_MEDUSA_BASE: /
      VITE_MEDUSA_BACKEND_URL: http://localhost:9000
      VITE_MEDUSA_STOREFRONT_URL: http://localhost:3000
      VITE_MEDUSA_PUBLISHABLE_KEY: pk_fe7220c20ab9f3cc9b0fbb86f6c2e126e621d17f7c176584cbdd7fe8b04c67af
      VITE_DISABLE_SELLERS_REGISTRATION: "false"

  storefront:
    build:
      context: ./storefront
    restart: unless-stopped
    ports:
      - "3000:8000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_REGION: tr
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_fe7220c20ab9f3cc9b0fbb86f6c2e126e621d17f7c176584cbdd7fe8b04c67af
      REVALIDATE_SECRET: supersecret
      NEXT_PUBLIC_SITE_NAME: "Kayı Marketplace"
      NEXT_PUBLIC_SITE_DESCRIPTION: "Kayı Multi-Vendor Marketplace"
      NEXT_PUBLIC_VENDOR_URL: http://localhost:7001
      NODE_OPTIONS: "--max-old-space-size=1536"
      NEXT_TELEMETRY_DISABLED: "1"
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  minio_data:
